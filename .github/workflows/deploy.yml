name: Build and Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t backend:latest .
          docker save backend:latest | gzip > backend.tar.gz

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "backend.tar.gz"
          target: "/home/ubuntu/app/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            
            # Load the new image
            gunzip -c backend.tar.gz | docker load
            rm backend.tar.gz
            
            # Stop existing backend if running
            docker stop backend 2>/dev/null || true
            docker rm backend 2>/dev/null || true
            
            # Check if frontend exists
            if docker images | grep -q "frontend"; then
              echo "Frontend exists, starting full stack with docker-compose..."
              docker-compose up -d
            else
              echo "Frontend not yet deployed, starting backend only..."
              docker-compose up -d backend
            fi
            
            # Clean up old images
            docker image prune -f
            
            # Show status
            docker ps
            
            # Verify
            sleep 5
            if docker ps | grep -q backend; then
              echo "✅ Backend is running!"
            else
              echo "❌ Backend failed to start"
              docker logs backend 2>&1 || true
              exit 1
            fi